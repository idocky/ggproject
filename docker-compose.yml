version: '3'

services:
    nginx:
        image: nginx:latest
        volumes:
            - ./:/var/www
            - ./_docker/nginx/conf.d:/etc/nginx/conf.d
        ports:
            - "8000:80"
        depends_on:
            - app
        container_name: gg_nginx

    app:
        build:
            context: .
            dockerfile: _docker/app/Dockerfile
        volumes:
            - ./:/var/www
        depends_on:
            - postgres
            - mongodb_init
        container_name: gg_app

    postgres:
        image: postgres:latest
        restart: always
        ports:
            - "10007:5432"
        environment:
            POSTGRES_PASSWORD: secret
            POSTGRES_USER: default
            POSTGRES_DB: default
    postgres_test:
        image: postgres:latest
        restart: always
        ports:
            - "10008:5432"
        environment:
            POSTGRES_PASSWORD: secret
            POSTGRES_USER: test_user
            POSTGRES_DB: test_db
    mongodb:
        image: mongo:latest
        container_name: laravel-mongodb
        command: ["--replSet", "rs0", "--bind_ip_all"]
        restart: always
        ports:
            - "27017:27017"
        environment:
            MONGO_INITDB_DATABASE: laravel
        volumes:
            - mongo_data_main:/data/db
        healthcheck:
            test: mongosh --quiet --eval 'db.runCommand("ping").ok' || exit 1
            interval: 5s
            timeout: 5s
            retries: 10

    mongodb_init:
        image: mongo:latest
        container_name: laravel-mongodb-init
        depends_on:
            mongodb:
                condition: service_healthy
        restart: "no"
        entrypoint: >
            mongosh --host mongodb --quiet --eval
            "try { rs.status(); } catch (e) { rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'mongodb:27017' }] }); }"
    redis:
        image: redis:latest
        restart: always
        volumes:
            - ./storage/redis/data:/data
        ports:
            - "10004:6379"

volumes:
    mongo_data_main:
